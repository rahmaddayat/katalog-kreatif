<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Produk - KatalogKreatif</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">KatalogKreatif</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link active" href="/produk/">Produk</a>
                <a class="nav-link" href="/kontak/">Kontak</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4 text-center">Produk Unggulan Kami</h2>
        <div class="row">
            {% for p in produk_list %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">{{ p.nama }}</h5>
                        <p class="card-text text-primary fw-semibold">{{ p.harga }}</p>
                        <p class="card-text text-muted small">{{ p.deskripsi|truncatewords:10 }}</p>
                    </div>
                    <div class="card-footer bg-transparent border-top-0 pb-3">
                        <a href="/produk/{{ p.id }}/" class="btn btn-outline-dark w-100">Lihat Detail</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
